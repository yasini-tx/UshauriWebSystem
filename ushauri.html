<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenereta ya Ushauri</title>
    <style>
        /* 1. Mipangilio ya Ukurasa Mzima (Body) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 2. Kichwa cha Habari (H1) */
        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        /* 3. Eneo la Mipangilio (Dropdown na Batani) */
        .controls-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        /* 4. Mrembo wa Dropdown Menu (Select) */
        select {
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background-color: #1e3c72; /* Imewekwa rangi thabiti ili isilete shida ya kioo */
            color: white;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: #4facfe;
        }

        /* 5. Mrembo wa Batani (Button) */
        button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6);
        }

        button:active {
            transform: translateY(1px);
        }

        /* 6. Sanduku Kuu la Kuonyesha Ushauri */
        #ushauriBox {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 16px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* 7. Maandishi ya Ushauri Wenyewe */
        #ushauri {
            font-size: 1.3rem;
            line-height: 1.6;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* 8. Maandishi ya ID na Category */
        #ushauriId {
            font-size: 0.9rem;
            color: #00ffcc;
            font-weight: bold;
            letter-spacing: 1px;
            margin: 0;
        }
        
        /* --- IPANGILIE SIMU (Vioo vyenye upana chini ya pixel 600) --- */
@media (max-width: 600px) {
    /* 1. Shusha ukubwa wa kichwa cha habari ili kisijae sana */
    h1 {
        font-size: 1.8rem; 
        margin-bottom: 20px;
    }

    /* 2. Panga dropdown na batani ziende chini badala ya kukaa pembeni */
    .controls-container {
        flex-direction: column; /* Inageuza kutoka kushoto-kulia kwenda juu-chini */
        width: 90%; /* Inachukua upana mkubwa wa kioo cha simu */
        gap: 10px; /* Inapunguza uwazi kati yao */
    }

    /* 3. Dropdown na batani zichukue upana mzima wa eneo lao kwenye simu */
    select, button {
        width: 100%;
        font-size: 0.95rem; /* Inapunguza herufi kidogo ili zikae vizuri */
        padding: 14px; /* Inanenepesha kidogo ili iwe rahisi mtumiaji kugusa kwa kidole */
    }

    /* 4. Rekebisha sanduku la ushauri lisibane sana kwenye simu */
    #ushauriBox {
        padding: 25px 15px; /* Inapunguza nafasi za ndani (padding) ili ushauri upate nafasi kubwa */
        width: 90%;
    }

    /* 5. Punguza ukubwa wa maandishi ya ushauri yasiumize macho */
    #ushauri {
        font-size: 1.1rem;
    }
}
    </style>
</head>
<body>

    <h1>jenereta ya ushauri</h1>

    <div class="controls-container">
        <select id="categorySelect">
            <option value="">-- Chagua Aina ya Ushauri (Zote) --</option>
            <option value="programming">Programming</option>
            <option value="elimu">Elimu</option>
            <option value="maisha">Maisha</option>
            <option value="motivation">Motivation</option>
            <option value="fedha">Fedha</option>
            <option value="mahusiano">Mahusiano</option>
        </select>

        <button id="getUshauri">Pata Ushauri</button>
    </div>

    <div id="ushauriBox">
        <p id="ushauri">Bonyeza batani kupata ushauri</p>
        <p id="ushauriId"></p>
    </div>

    <script src="ushauri.js"></script>
</body>
</html>
